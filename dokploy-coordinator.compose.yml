services:
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
    restart: unless-stopped
    volumes:
      - redis-data:/data

  coordinator:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - redis
    environment:
      APP_ROLE: coordinator
      PORT: 4000
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  redis-data:

