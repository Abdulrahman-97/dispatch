services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_PACKAGE_SPEC: ${PYTHON_PACKAGE_SPEC:-}
    environment:
      APP_ROLE: worker
      COORDINATOR_URL: ${COORDINATOR_URL}
      WORKER_NAME: ${WORKER_NAME:-worker-1}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-1000}
      PYTHON_ROOT: /app/python
      PYTHON_BIN: ${PYTHON_BIN:-/opt/dispatch-python/bin/python}
      DISPATCH_CALLABLE_ALLOWLIST_JSON: ${DISPATCH_CALLABLE_ALLOWLIST_JSON:-}
      FMP_API_KEY: ${FMP_API_KEY:-}
      API_KEY: ${API_KEY:-}
      BUCKET_NAME: ${BUCKET_NAME:-}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    restart: unless-stopped
