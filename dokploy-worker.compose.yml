services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_PACKAGE_SPEC: ${PYTHON_PACKAGE_SPEC:-}
    environment:
      APP_ROLE: worker
      COORDINATOR_URL: ${COORDINATOR_URL}
      WORKER_NAME: ${WORKER_NAME:-worker-1}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      DISPATCH_WORKER_RESOURCES_JSON: ${DISPATCH_WORKER_RESOURCES_JSON:-}
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-1000}
      PYTHON_ROOT: /app/python
      PYTHON_BIN: ${PYTHON_BIN:-/opt/dispatch-python/bin/python}
      DISPATCH_CALLABLE_ALLOWLIST_FILE: ${DISPATCH_CALLABLE_ALLOWLIST_FILE:-}
      DISPATCH_CALLABLE_ALLOWLIST_JSON: ${DISPATCH_CALLABLE_ALLOWLIST_JSON:-}
    restart: unless-stopped
